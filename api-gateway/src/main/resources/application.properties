server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=organization-service
spring.cloud.gateway.routes[1].uri=lb://ORGANIZATION-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/organizations/**

spring.cloud.gateway.routes[2].id=rating-service
spring.cloud.gateway.routes[2].uri=lb://RATING-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/ratings/**

spring.cloud.gateway.routes[3].id=review-service
spring.cloud.gateway.routes[3].uri=lb://REVIEW-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/reviews/**